<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Okoone CRM{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body>

  <nav class="container-fluid">
    <ul>
      <li><a href="/prospects" class="brand">Okoone CRM</a></li>
    </ul>
    <ul>
      <li><a href="/prospects" {% if active_nav == 'prospects' %}aria-current="page"{% endif %}>Prospects</a></li>
      <li><a href="/searches" {% if active_nav == 'searches' %}aria-current="page"{% endif %}>Recherches</a></li>
      <li><a href="/campaigns" {% if active_nav == 'campaigns' %}aria-current="page"{% endif %}>Campagnes</a></li>
      <li><a href="/eval" {% if active_nav == 'eval' %}aria-current="page"{% endif %}>Evaluation</a></li>
      <li><a href="/logout" style="font-size:0.8rem;opacity:0.6;">Logout</a></li>
    </ul>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="container">
    <hr>
    <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.8rem; color:var(--pico-muted-color);">
      <span>Okoone Prospecting CRM v0.1</span>
      <span
        hx-get="/api/v1/scraper/status"
        hx-trigger="load, every 30s"
        hx-swap="innerHTML"
        id="scraper-status-indicator"
      >
        <span class="scraper-status">
          <span class="scraper-dot offline"></span> Chargement...
        </span>
      </span>
    </div>
  </footer>

</body>
</html>
