<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Okoone CRM</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-box">
      <h1>Okoone</h1>
      <p class="login-sub">Prospecting Intelligence</p>
      {% if error %}
      <div class="login-error">Mot de passe incorrect.</div>
      {% endif %}
      <form method="post" action="/login">
        <input type="password" name="password" placeholder="Mot de passe" autofocus required style="text-align:center;margin-bottom:1rem;">
        <button type="submit" class="btn-primary" style="width:100%;">Entrer</button>
      </form>
    </div>
  </div>
</body>
</html>
